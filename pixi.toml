[workspace]
name = "research-template"
version = "0.1.0"
description = "A reproducible research template combining Snakemake pipeline, Obsidian wiki, and OpenCode LLM loop"
authors = ["Claude Opus 4.7 <claude@anthropic.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# All dependencies in one flat environment (pixi simplifies dependency management).
#
# NOTE: LaTeX (latexmk + TeX Live) is intentionally NOT included here. A full
# TeX Live install is too heavy for a project-local pixi env. Install it system-wide
# instead (e.g. via your distro's package manager or https://tug.org/texlive/).
# CI installs TeX Live separately in .github/workflows/reproduction.yaml.
[dependencies]
python = "3.12.*"
snakemake = ">=9.8"
# Analysis tools
numpy = "2.3.*"
pandas = "2.3.*"
matplotlib = "3.10.*"
seaborn = "0.13.*"
ipdb = "0.13.*"
# Testing
pytest = "8.4.*"
pytest-html = "4.1.*"
# General Python utilities
pip = "25.1.*"
# DAG visualization
graphviz = "*"
# Linting & CI
ruff = "*"
yamllint = "*"
shellcheck = "*"
cmcrameri = ">=1.9,<2"
sphinx = ">=8.2.3,<9"
sphinx-rtd-theme = ">=3.1.0,<4"
sphinx-autoapi = ">=3.8.0,<4"
sphinx-copybutton = ">=0.5.2,<0.6"
myst-parser = ">=5.1.0,<6"

# --- Tasks ---
[tasks]
run = "snakemake --cores 4"
test = "snakemake test --cores 4"
dag = "snakemake dag --cores 1"
clean = "snakemake clean"
"clean-all" = "snakemake clean && rm -rf build/"
_docs-build = { cmd = "sphinx-build docs build/html", description = "Build the Sphinx documentation" }
_docs-serve = { cmd = "python -m http.server 8000", cwd = "build/html", description = "Serve the built documentation on http://127.0.0.1:8000" }
docs = { depends-on = ["_docs-build", "_docs-serve"], description = "Build the documentation and serve it on http://127.0.0.1:8000" }
